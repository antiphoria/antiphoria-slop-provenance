name: Org Quality

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  quality-gate:
    uses: antiphoria/.github/.github/workflows/quality-gate.yml@main
    with:
      policy-ref: main
      python-version: "3.12"

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Run tests
        run: pytest -v