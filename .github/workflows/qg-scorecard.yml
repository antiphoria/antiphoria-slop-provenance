name: Org Quality (OpenSSF Scorecard)

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "30 1 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    uses: antiphoria/.github/.github/workflows/scorecard.yml@main
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write