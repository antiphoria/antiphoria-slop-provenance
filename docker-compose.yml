services:
  kafka:
    image: apache/kafka:3.9.2
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - "127.0.0.1:9092:9092"
      - "127.0.0.1:9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s

  bootstrap-topics:
    build: .
    command: slop-bootstrap-topics --bootstrap-servers kafka:9092
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"

  generator-service:
    build: .
    user: root
    command: slop-generator-service
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ORCHESTRATOR_TRANSPORT=kafka
      - STATE_DB_PATH=/state/generator.db
      - ARTIFACT_DB_PATH=/state/artifacts.db
      - KAFKA_HEALTH_FILE=/state/health/generator-service.ok
    volumes:
      - ${STATE_HOST_DIR:-./state}:/state
    depends_on:
      bootstrap-topics:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "test -f /state/health/generator-service.ok && test $(($(date +%s) - $(stat -c %Y /state/health/generator-service.ok))) -lt 60"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  notary-service:
    build:
      context: .
      dockerfile: Dockerfile.notary
    user: root
    command: slop-notary-service
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ORCHESTRATOR_TRANSPORT=kafka
      - STATE_DB_PATH=/state/notary.db
      - ARTIFACT_DB_PATH=/state/artifacts.db
      - KAFKA_HEALTH_FILE=/state/health/notary-service.ok
      # Override OQS_INSTALL_PATH so .env (Windows path) does not override Docker-built liboqs
      - OQS_INSTALL_PATH=/opt/liboqs
      # ENABLE_C2PA and C2PA_MODE come from .env; override key paths for container
      - PQC_PRIVATE_KEY_PATH=/app/keys-vault/private.key
      - C2PA_PRIVATE_KEY_PATH=/app/keys-vault/c2pa-private-key.pem
      - OQS_PUBLIC_KEY_PATH=/app/keys/public.key
      - C2PA_SIGN_CERT_CHAIN_PATH=/app/keys/c2pa-cert-chain.pem
      - RFC3161_CA_CERT_PATH=/app/keys/tsa-ca.pem
      - RFC3161_TSA_UNTRUSTED_CERT_PATH=/app/keys/tsa.crt
    volumes:
      - ${KEYS_HOST_DIR:-./keys}:/app/keys:ro
      - ${KEYS_VAULT_HOST_DIR:-./keys}:/app/keys-vault:ro
      - ${STATE_HOST_DIR:-./state}:/state
    depends_on:
      bootstrap-topics:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "test -f /state/health/notary-service.ok && test $(($(date +%s) - $(stat -c %Y /state/health/notary-service.ok))) -lt 60"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  ledger-service:
    build: .
    user: root
    command: slop-ledger-service
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - LEDGER_REPO_PATH=/ledger
      - ORCHESTRATOR_TRANSPORT=kafka
      - STATE_DB_PATH=/state/ledger.db
      - ARTIFACT_DB_PATH=/state/artifacts.db
      - KAFKA_HEALTH_FILE=/state/health/ledger-service.ok
    volumes:
      - ${LEDGER_HOST_DIR:-./ledger}:/ledger
      - ${STATE_HOST_DIR:-./state}:/state
    depends_on:
      bootstrap-topics:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "test -f /state/health/ledger-service.ok && test $(($(date +%s) - $(stat -c %Y /state/health/ledger-service.ok))) -lt 60"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  provenance-service:
    build: .
    user: root
    command: slop-provenance-service
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - LEDGER_REPO_PATH=/ledger
      - ORCHESTRATOR_TRANSPORT=kafka
      - STATE_DB_PATH=/state/provenance.db
      - ARTIFACT_DB_PATH=/state/artifacts.db
      - KAFKA_HEALTH_FILE=/state/health/provenance-service.ok
    volumes:
      - ${LEDGER_HOST_DIR:-./ledger}:/ledger
      - ${STATE_HOST_DIR:-./state}:/state
    depends_on:
      bootstrap-topics:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "test -f /state/health/provenance-service.ok && test $(($(date +%s) - $(stat -c %Y /state/health/provenance-service.ok))) -lt 60"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  telemetry-service:
    build: .
    command: slop-telemetry-service
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ORCHESTRATOR_TRANSPORT=kafka
      - STATE_DB_PATH=/state/telemetry.db
      - ARTIFACT_DB_PATH=/state/artifacts.db
      - KAFKA_HEALTH_FILE=/state/health/telemetry-service.ok
    volumes:
      - ${STATE_HOST_DIR:-./state}:/state
    depends_on:
      bootstrap-topics:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "test -f /state/health/telemetry-service.ok && test $(($(date +%s) - $(stat -c %Y /state/health/telemetry-service.ok))) -lt 60"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
