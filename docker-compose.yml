version: "3.9"

services:
  kafka:
    image: bitnami/kafka:3.7
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - "127.0.0.1:9092:9092"

  generator-service:
    build: .
    command: slop-generator-service
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ORCHESTRATOR_TRANSPORT=kafka
    depends_on:
      - kafka

  notary-service:
    build: .
    command: slop-notary-service
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ORCHESTRATOR_TRANSPORT=kafka
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      - kafka

  ledger-service:
    build: .
    command: slop-ledger-service
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - LEDGER_REPO_PATH=/ledger
      - ORCHESTRATOR_TRANSPORT=kafka
    volumes:
      - ./ledger:/ledger
    depends_on:
      - kafka

  provenance-service:
    build: .
    command: slop-provenance-service
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - LEDGER_REPO_PATH=/ledger
      - ORCHESTRATOR_TRANSPORT=kafka
    volumes:
      - ./ledger:/ledger
    depends_on:
      - kafka

  telemetry-service:
    build: .
    command: slop-telemetry-service
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ORCHESTRATOR_TRANSPORT=kafka
    depends_on:
      - kafka
