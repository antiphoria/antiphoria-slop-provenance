[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "slop-orchestrator"
version = "0.0.1"
description = "Event-driven slop orchestration MVP."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "google-generativeai>=0.4.0,<0.9.0",
    "pydantic>=2.5.0,<3.0.0",
    "liboqs-python>=0.14.0",
    "pygit2>=1.14.0,<2.0.0",
    "PyYAML>=6.0",
    "aiokafka>=0.10.0",
]

[project.scripts]
slop-cli = "src.cli:main"
slop-generator-service = "src.runtime.generator_service:main"
slop-notary-service = "src.runtime.notary_service:main"
slop-ledger-service = "src.runtime.ledger_service:main"
slop-provenance-service = "src.runtime.provenance_service:main"
slop-telemetry-service = "src.runtime.telemetry_service:main"
slop-replay-dlq = "src.runtime.replay_dlq:main"
slop-bootstrap-topics = "src.runtime.bootstrap_topics:main"
slop-smoke-kafka = "src.runtime.smoke_kafka_pipeline:main"
slop-metrics = "src.runtime.metrics_report:main"

[tool.black]
line-length = 88
target-version = ["py310"]
include = '\.pyi?$'

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true
no_implicit_optional = true
show_error_codes = true
pretty = true

[tool.flake8]
max-line-length = 88
extend-ignore = [
    "E203",
    "W503",
]
select = [
    "E",
    "F",
    "W",
]
